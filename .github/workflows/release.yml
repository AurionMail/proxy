name: Build and Release Go App

on:
  release:
    types: [created]

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Replace with your Go version
          cache: true        # Automatically caches Go dependencies

      - name: Tidy Go modules
        run: go mod tidy

      - name: Build application
        run: go build -ldflags="-w -s" -o aurion-proxy ./cmd/aurion-proxy

      - name: Upload Binary to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aurion-proxy
          asset_name: aurion-proxy
          tag: ${{ github.ref }}
          overwrite: true